<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="css/m-reset.css" rel="stylesheet" type="text/css" />
    <link href="css/style.css" rel="stylesheet" type="text/css" />
    <link href="css/animate.min.css" rel="stylesheet" type="text/css" />
    <script type="text/javascript">
        document.write("<scr"+"ipt src=\"js/rem2.0.min.js\" fu-psd='750' fu-min='40' fu-max='100'></sc"+"ript>")
    </script>
    <!-- <script type="text/javascript" src="js/rem2.0.min.js" fu-psd="750" fu-min="40" fu-max="100"></script> -->
    <title>公共图书馆法在身边</title>
</head>
<body>
    <div class="loading-page">
        <div class="wrap color-A">
            <div class="k-line k-lineA-1"></div>
            <div class="k-line k-lineA-2"></div>
            <div class="k-line k-lineA-3"></div>
            <div class="k-line k-lineA-4"></div>
            <div class="k-line k-lineA-5"></div>
            <div class="loading-num">0%</div>
        </div>
       
    </div>
    <div class="playBtn"></div>
    <div id="page">

    </div>

    <div id="music"></div>
    <div id="animation"></div>

    <audio loop src="js/music.mp3" id="musicMP3"  style="display:none;"></audio>
    <audio src="js/xiezi.mp3" id="xieziMp3" style="display:none;"></audio>
    <audio src="js/zhifeiji.mp3" id="zhifeijiMp3" style="display:none;"></audio>
    <audio src="js/dazi.mp3" id="daziMp3" style="display:none;"></audio>
    <audio src="js/diaoke.mp3" id="diaokeMp3" style="display:none;"></audio>
    <audio src="js/guzhang.mp3" id="guzhangMp3" style="display:none;"></audio>
    <audio src="js/shaoxiandui.mp3" id="shaoxianduiMp3" style="display:none;"></audio>
    <audio src="js/gonglu.mp3" id="gongluMp3" style="display:none;"></audio>
    <audio src="js/gezi.mp3" id="geziMp3" style="display:none;"></audio>
    <audio src="js/luodi.mp3" id="luodiMp3" style="display:none;"></audio>
    <audio src="js/baozhi.mp3" id="baozhiMp3" style="display:none;"></audio>
    

    <div id="escBtn"></div>
    <div class="logoImg"></div>

    <div class="top_icon"></div>
    <script type="text/javascript">
      document.write("<scr"+"ipt src=\"js/jquery.js\"></sc"+"ript>")
    </script>
    <script type="text/javascript">
        document.write("<scr"+"ipt src=\"js/data.js\"></sc"+"ript>")
    </script>
    <script type="text/javascript">
        document.write("<scr"+"ipt src=\"js/bodymovin.min.js\"></sc"+"ript>")
    </script>
    <!-- <script src="js/jquery.js"></script> -->
    <!-- <script src="js/data.js"></script> -->
    <!-- <script src="js/bodymovin.min.js"></script> -->
    <script>  
            var i=0; 
            var onOff = false; //动画开关

            var ii=0;
            var iic = 0;
            var cc = 0;
            var xieziNum = 0;
            var zhifeijiNum = 0;
            var daziNum = 0;
            var diaokeNum = 0;
            var guzhangNum = 0;
            var shaoxianduiNum =0;
            var gongluNum = 0;
            var geziNum = 0;
            var luodiNum = 0;
            var baozhiNum = 0;

             var arr = [
                    [194,568],//第一场
                    [568,747],
                    [747,900],
                    //[900,1330],
                    [900,1240],
                    //[1330,1800],
                    [1330,1702],
                    [1840,2200],
                    //[2200,2720],
                    [2200,2668],
                    [2720,3020],
                    [3020,3369]
              ]
            
            document.querySelector('#page').addEventListener('touchstart',function(ev){
                ev.preventDefault();
            })
            document.querySelector('#page').addEventListener('touchend',function(ev){
                ev.preventDefault();
            })
             document.querySelector('#page').addEventListener('touchend',function(ev){
                ev.preventDefault();
            })

            
            
            var au = document.getElementById('musicMP3');//背景音乐
            //var MP3 = document.getElementById('MP3');//写字
            // var NiaoMP3 = document.getElementById('NiaoMP3');//鸟
           // MP3.play();
           
            $("#music").click(function(){
                if(au.paused){
                    au.play();
                    $("#music").addClass('zd').css("background-image","url(img/music.png)");
                }
                else{
                    au.pause();
                    $("#music").removeClass('zd').css("background-image","url(img/music2.png)");
                }
            })


            $(".playBtn").click(function(){
                
                onOff = true;
                //显示上滑动
                $(".top_icon").show();
                changNum++
                $(".playBtn").hide();
                $("#music").addClass('zd');
                au.play();
                //预先加载声音
                // xieziMp3.load();
                // zhifeijiMp3.load();
                // luodiMp3.load();
                // daziMp3.load();
                // baozhiMp3.load();
                // diaokeMp3.load();
                // shaoxianduiMp3.load();
                // guzhangMp3.load();
                // geziMp3.load();
                // gongluMp3.load();


                $("#music").addClass('zd').css("background-image","url(img/music.png)");
                anim.playSegments([
                        [181,189]
                    ], true);
            })

           
         
           

           var loadingNum = ['0%','12%','26%','32%','45%','52%','60%','78%','96%','100%'];
           var ccInt= setInterval(function(){
                    au.pause();
                    cc++
                    $(".loading-num").html(loadingNum[cc])
                    if(cc==10){
                        
                        anim.playSegments([
                             [0,181]
                        ], true);
                        $(".loading-page").hide();
                        iiFn();
                        
                        window.clearInterval(ccInt);

                    }
           },1000);

            function iiFn(){
                var iiInt= setInterval(function(){
                            ii++
                            if(ii==6){
                                
                                anim.playSegments([
                                            [180,181]
                                ], true);
                                $(".playBtn").show().css('animation-play-state','running');
                                
                                window.clearInterval(iiInt);
                            }
                },1000);
            }

        var anim = bodymovin.loadAnimation({
            loop:false,
            autoplay:true,
            renderer:'svg',  //渲染方式，有"html"、"canvas"和"svg"三种
            container:document.getElementById('animation'),
            animationData: animationData
        });
        
       var changNum = 1;
       
        
        //每一次动画完成
        anim.addEventListener('complete',function(aa){
            if(changNum>1){
                //20数组的长度-1
                if(i<=8){
                    //显示上滑动
                    $(".top_icon").show();
                }
               
            }

            if(!$(".playBtn").is(":visible")){
                onOff = true
            }
        })
      
        $("#escBtn").click(function(){
            $(this).hide();
            i=0;
            onOff = true;
            //显示上滑动
            $(".top_icon").show();
            changNum++
            $(".playBtn").hide();
            $("#music").addClass('zd');
            au.play();
            $("#music").addClass('zd').css("background-image","url(img/music.png)");
            $(".logoImg").hide();
            anim.playSegments([
                    [181,189]
            ], true);
            xieziNum = 0;
            zhifeijiNum = 0;
            daziNum = 0;
            diaokeNum = 0;
            guzhangNum = 0;
            shaoxianduiNum =0;
            gongluNum = 0;
            geziNum = 0;
            luodiNum = 0;
            baozhiNum = 0;
        })

        var startX, startY;
        document.addEventListener('touchstart',function (ev) {
            startX = ev.touches[0].pageX;
            startY = ev.touches[0].pageY;
        }, false);

        document.addEventListener('touchend',function (ev) {
            
            var endX, endY;
            endX = ev.changedTouches[0].pageX;
            endY = ev.changedTouches[0].pageY;
            var direction = GetSlideDirection(startX, startY, endX, endY);
            switch(direction) {
                case 0:
                    break;
                case 1:
                    // 向上
                    if(onOff){
                        changNum++
                        onOff = false
                        //隐藏上滑动
                        $(".top_icon").hide();
                        if(i<arr.length){
                            
                            anim.playSegments([
                                [arr[i][0], arr[i][1]
                            ]
                            ], true);
                            i++
                            //播放第一场的写字
                            if(i==1){
                                //9
                                var xiezi= setInterval(function(){
                                            xieziNum++
                                            if(xieziNum==9){
                                                xieziMp3.play();
                                                window.clearInterval(xiezi);
                                                xieziNum=0;
                                            }
                                },1000);
                                return;
                            }
                            //播放第三场的纸飞机
                            if(i==3){
                                //4
                                var xiezi= setInterval(function(){
                                    zhifeijiNum++
                                    if(zhifeijiNum==4){
                                        zhifeijiMp3.play();
                                            window.clearInterval(xiezi);
                                            zhifeijiNum=0;
                                    }   
                                },1000);
                                return;
                            }
                             //播放第四场的落地
                             if(i==4){
                                //10
                                var luodi= setInterval(function(){
                                    luodiNum++
                                    if(luodiNum==13){
                                        luodiMp3.play();
                                            window.clearInterval(luodi);
                                            luodiNum=0;
                                    }   
                                },1000);
                                return;
                            }
                            //播放第五场的打字、报纸
                            if(i==5){
                                //2、7
                                var dazi= setInterval(function(){
                                    daziNum++
                                    baozhiNum++
                                    if(daziNum==2){
                                        daziMp3.play();
                                    }  
                                    if(baozhiNum==6){
                                        baozhiMp3.play();
                                            window.clearInterval(dazi);
                                            daziNum=0;
                                            baozhiNum=0;
                                    }  
                                },1000);
                                return;
                            }

                            //播放第六场的雕刻
                            if(i==6){
                                //4
                                var diaoke= setInterval(function(){
                                    diaokeNum++
                                    if(diaokeNum==9){
                                        diaokeMp3.play();
                                            window.clearInterval(diaoke);
                                            diaokeNum=0;
                                    }   
                                },1000);
                                return;
                            }

                            //播放第七场的少先队、鼓掌
                            if(i==7){
                                //11
                                var shaoxiandui= setInterval(function(){
                                    shaoxianduiNum++
                                    guzhangNum++;
                                    if(guzhangNum==11){
                                        guzhangMp3.play();
                                    }  
                                    if(shaoxianduiNum==18){
                                        shaoxianduiMp3.play();
                                            window.clearInterval(shaoxiandui);
                                            shaoxianduiNum=0;
                                            guzhangNum=0;
                                    }   
                                },1000);
                                return;
                            }

                             //播放第八场的公路、鸽子
                             if(i==8){
                                //2
                                var guzhang= setInterval(function(){
                                    gongluNum++;
                                    geziNum++;
                                   
                                    if(gongluNum==1){
                                        gongluMp3.play();
                                    }    
                                    if(geziNum==6){
                                        geziMp3.play();
                                        window.clearInterval(guzhang);
                                        gongluNum=0;
                                        geziNum=0;
                                    }  
                                },1000);
                                return;
                            }


                            if(i==9){
                                //显示回顾按钮
                                var iicInt= setInterval(function(){
                                            iic++
                                            if(iic==6){
                                                $("#escBtn").show();
                                                $(".logoImg").show();
                                                iic=0;
                                                window.clearInterval(iicInt);
                                            }
                                },1000);
                                return;
                               
                            }
                        }
                    }
                    
                   
                    break;
                case 2:
                    // 向下
                    if(onOff){
                        onOff = false

                         //隐藏上滑动
                         $(".top_icon").hide();
                        if(i!=0){
                            i--
                            changNum--
                            anim.playSegments([
                                [arr[i][1], arr[i][0]
                            ]
                            ], true);

                            //播放第一场的写字
                            // if(i==0){
                            //    //5
                            //     var xiezi= setInterval(function(){
                            //                 xieziNum++
                            //                 if(xieziNum==5){
                            //                     xieziMp3.play();
                            //                     window.clearInterval(xiezi);
                            //                     xieziNum=0;
                            //                 }
                            //     },1000);
                            //     return;
                            // }

                             if(i==8){
                                 //隐藏重看按钮和logo
                                 $("#escBtn").hide();
                                 $(".logoImg").hide();
                             }

                        }else if(i==0){
                            onOff = true;
                            $(".top_icon").show();
                            return
                        }
                   }
                    
                    break;
 
                default:
            }
        }, false);
        
        function GetSlideDirection(startX, startY, endX, endY) {
            var dy = startY - endY;
            //var dx = endX - startX;
            var result = 0;
            if(dy>0) {//向上滑动
                result=1;
            }else if(dy<0){//向下滑动
                result=2;
            }
            else
            {
                result=0;
            }
            return result;
        }

       
      
    </script>
</body>
</html>
